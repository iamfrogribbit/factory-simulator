# Processor has ample input but is output-blocked by slow downstream consumer

[config]
warmup_duration: 100
statistics_duration: 600

[machine]
name: Ore Mine
output: Ore, 10, ore_belt
cooldown: 0

[machine]
name: Smelter
input: Ore, 10, ore_belt
output: Ingot, 10, ingot_belt
cooldown: 0

[machine]
name: Slow Crafter
input: Ingot, 10, ingot_belt
output: Product, 1, sink
cooldown: 4
