# Machine with two output ports to different belts

[config]
warmup_duration: 100
statistics_duration: 600

[machine]
name: Refinery
output: Fuel, 5, fuel_belt
output: Slag, 3, slag_belt
cooldown: 0

[machine]
name: Fuel Consumer
input: Fuel, 5, fuel_belt
output: Product, 1, sink
cooldown: 0

[machine]
name: Slag Consumer
input: Slag, 3, slag_belt
output: Waste, 1, sink
cooldown: 0
