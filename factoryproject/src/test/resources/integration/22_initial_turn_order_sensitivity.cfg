# Initial round-robin turn should follow config machine order.

[config]
warmup_duration: 1 # produces from mine, and populates ore_belt.
statistics_duration: 1 # on tock, ore_belt should have 5 items. If round robin starts with Consumer 1 as expected, Consumer 1 will have 100% utilisation and Consumer 2 will have 0%. If round robin starts  with Consumer 2, the opposite will be true and the test will fail.

[machine]
name: Mine A
output: Ore, 5, ore_belt
cooldown: 0

[machine]
name: Ore Consumer 1
input: Ore, 3, ore_belt
output: FirstOut, 1, sink
cooldown: 0

[machine]
name: Ore Consumer 2
input: Ore, 3, ore_belt
output: SecondOut, 1, sink
cooldown: 0
