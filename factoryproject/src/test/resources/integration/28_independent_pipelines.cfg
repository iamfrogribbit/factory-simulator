# Two disconnected pipelines in one config should not interfere with each other.

[config]
warmup_duration: 100
statistics_duration: 600

[machine]
name: Ore Mine
output: Ore, 10, ore_belt
cooldown: 0

[machine]
name: Ore Smelter
input: Ore, 10, ore_belt
output: Ingot, 4, sink
cooldown: 0

[machine]
name: Copper Mine
output: Copper Ore, 6, copper_belt
cooldown: 0

[machine]
name: Copper Processor
input: Copper Ore, 6, copper_belt
output: Wire, 3, sink
cooldown: 1
