# Round-robin skips full destinations (small consumer fills fast, large gets the rest)

[config]
warmup_duration: 100
statistics_duration: 600

[machine]
name: Ore Mine
output: Ore, 10, ore_belt
cooldown: 0

[machine]
name: Small Smelter
input: Ore, 2, ore_belt
output: Ingot, 2, sink
cooldown: 0

[machine]
name: Large Smelter
input: Ore, 8, ore_belt
output: Ingot, 8, sink
cooldown: 0
