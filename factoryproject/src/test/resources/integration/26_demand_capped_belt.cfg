# Demand-capped belt: mine produces 10 items per activation, consumer needs 2.
# This is a simpler version of bottleneck, with no cooldown involved.

[config]
warmup_duration: 100
statistics_duration: 600

[machine]
name: Ore Mine
output: Ore, 10, ore_belt
cooldown: 0

[machine]
name: Ore Consumer
input: Ore, 2, ore_belt
output: Product, 1, sink
cooldown: 0
