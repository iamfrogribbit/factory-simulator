# Supply-capped belt: mine produces 2 items per activation, consumer needs 10.
# This is a simpler version of the undersupply scenario, with only 1 consumer.

[config]
warmup_duration: 100
statistics_duration: 600

[machine]
name: Ore Mine
output: Ore, 2, ore_belt
cooldown: 0

[machine]
name: Ore Consumer
input: Ore, 10, ore_belt
output: Product, 1, sink
cooldown: 0
