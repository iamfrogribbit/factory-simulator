# Round-robin pushes evenly to multiple destinations (1-to-2)

[config]
warmup_duration: 100
statistics_duration: 600

[machine]
name: Ore Mine
output: Ore, 10, ore_belt
cooldown: 0

[machine]
name: Smelter A
input: Ore, 5, ore_belt
output: Ingot, 5, sink
cooldown: 0

[machine]
name: Smelter B
input: Ore, 5, ore_belt
output: Ingot, 5, sink
cooldown: 0
