# Belt balancer with 3 sources and 2 destinations (true N-to-M)
# Supply matches demand: 3*4 = 12/tick in, 2*6 = 12/tick out

[config]
warmup_duration: 100
statistics_duration: 600

[machine]
name: Mine A
output: Ore, 4, ore_belt
cooldown: 0

[machine]
name: Mine B
output: Ore, 4, ore_belt
cooldown: 0

[machine]
name: Mine C
output: Ore, 4, ore_belt
cooldown: 0

[machine]
name: Smelter A
input: Ore, 6, ore_belt
output: Ingot, 3, sink
cooldown: 0

[machine]
name: Smelter B
input: Ore, 6, ore_belt
output: Ingot, 3, sink
cooldown: 0
