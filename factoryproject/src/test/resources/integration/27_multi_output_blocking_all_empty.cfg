# Multiple outputs must all be empty before re-activation.
# One output goes directly to sink (fast clear), the other goes to a slow downstream
# machine via a belt. The producer should be blocked by the slow output path.

[config]
warmup_duration: 100
statistics_duration: 600

[machine]
name: Ore Mine
output: Ore, 10, ore_belt
cooldown: 0

[machine]
name: Splitter
input: Ore, 10, ore_belt
output: FastOut, 5, sink
output: Slop, 5, slop_belt
cooldown: 0

[machine]
name: Slop Consumer
input: Slop, 5, slop_belt
output: Waste, 1, sink
cooldown: 4
