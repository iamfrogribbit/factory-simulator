# Warmup step 1 produces one unit of ore from mine, which is collected by the ore_belt
# Warm up step 2 activates Ore Processor A, which takes the ore from the belt, mine produces another unit, which is added to the ore_belt.
# During the statistics window, Ore Processor B should activate first if order preserved. Ore Processor A should not be shown as used.

[config]
warmup_duration: 2
statistics_duration: 1

[machine]
name: Ore Mine
output: Ore, 1, ore_belt
cooldown: 0

[machine]
name: Ore Processor A
input: Ore, 1, ore_belt
output: A_Out, 1, sink
cooldown: 0

[machine]
name: Ore Processor B
input: Ore, 1, ore_belt
output: B_Out, 1, sink
cooldown: 0
