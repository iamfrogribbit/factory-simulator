# Checks destination turn persistence across tocks.
# A 1-item producer should alternate destinations over time if turn state is preserved.
# Over a 12 step duration, each consumer should receive 6 items if turns are preserved 
# (thus each consumer is utilised 1/12 of the time),

[config]
warmup_duration: 1
statistics_duration: 12

[machine]
name: Single Item Source
output: Ore, 1, ore_belt
cooldown: 0

[machine]
name: Ore Processor A
input: Ore, 6, ore_belt
output: A_Out, 1, sink
cooldown: 0

[machine]
name: Ore Processor B
input: Ore, 6, ore_belt
output: B_Out, 1, sink
cooldown: 0
