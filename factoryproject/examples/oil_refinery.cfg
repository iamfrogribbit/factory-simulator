# Oil Refinery with Recycling Loop
#
# Demonstrates a cyclic factory: the Cracker feeds recycled Crude Oil
# back into the same belt that the Oil Well feeds into.
#
# Oil Well ──┐
#            ├→ [crude_belt] → Refinery ──→ Fuel (sink)
# Cracker ───┘                    │
#    ↑                            ↓
#    └──── [residue_belt] ──── Residue

[config]
warmup_duration: 1000
statistics_duration: 600

[machine]
name: Oil Well
output: Crude Oil, 10, crude_belt
cooldown: 0

[machine]
name: Refinery
input: Crude Oil, 10, crude_belt
output: Fuel, 6, sink
output: Residue, 5, residue_belt
cooldown: 0

[machine]
name: Cracker
input: Residue, 5, residue_belt
output: Fuel, 3, sink
output: Crude Oil, 2, crude_belt
cooldown: 1
