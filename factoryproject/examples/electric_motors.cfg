# Electric Motor Factory
#
# A multi-stage factory with N-to-M belt balancers.
#
# Iron Mine → [Iron Smelter x2] → Iron Ingot ───────────────────────────────┐
#                                                                           ├→ [Motor Assembler x3] → Motor
# Copper Mine → [Copper Smelter x2] → Copper Ingot → [Wire Maker x2] → Wire ┘
#
# Note: No single machine is a true bottleneck here, yet no machine reaches
# 100% utilisation. This is because the round-robin belt distribution and
# limited single-batch storage in each machine create spikes and lulls in
# demand that prevent machines from staying perfectly busy. In a real factory
# game, storage buffers between stages would smooth this out.

[config]
warmup_duration: 10000
statistics_duration: 600

[machine]
name: Iron Mine
output: Iron Ore, 15, iron_ore_belt
cooldown: 0

[machine]
name: Copper Mine
output: Copper Ore, 12, copper_ore_belt
cooldown: 0

[machine]
name: Iron Smelter A
input: Iron Ore, 6, iron_ore_belt
output: Iron Ingot, 3, iron_ingot_belt
cooldown: 0

[machine]
name: Iron Smelter B
input: Iron Ore, 6, iron_ore_belt
output: Iron Ingot, 3, iron_ingot_belt
cooldown: 0

[machine]
name: Copper Smelter A
input: Copper Ore, 5, copper_ore_belt
output: Copper Ingot, 3, copper_ingot_belt
cooldown: 0

[machine]
name: Copper Smelter B
input: Copper Ore, 5, copper_ore_belt
output: Copper Ingot, 3, copper_ingot_belt
cooldown: 0

[machine]
name: Wire Maker A
input: Copper Ingot, 3, copper_ingot_belt
output: Copper Wire, 2, wire_belt
cooldown: 0

[machine]
name: Wire Maker B
input: Copper Ingot, 3, copper_ingot_belt
output: Copper Wire, 2, wire_belt
cooldown: 0

[machine]
name: Motor Assembler A
input: Iron Ingot, 4, iron_ingot_belt
input: Copper Wire, 2, wire_belt
output: Motor, 1, sink
cooldown: 1

[machine]
name: Motor Assembler B
input: Iron Ingot, 4, iron_ingot_belt
input: Copper Wire, 2, wire_belt
output: Motor, 1, sink
cooldown: 1

[machine]
name: Motor Assembler C
input: Iron Ingot, 4, iron_ingot_belt
input: Copper Wire, 2, wire_belt
output: Motor, 1, sink
cooldown: 1
